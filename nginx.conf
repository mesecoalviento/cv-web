server {
    listen 80;
    server_name xabierdiez.com www.xabierdiez.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name xabierdiez.com www.xabierdiez.com;

    ssl_certificate /etc/letsencrypt/live/xabierdiez.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xabierdiez.com/privkey.pem;

    location / {
        proxy_pass http://cv-web:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
